<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>设计系统库 · 截图总览</title>
<style>
  :root{ --bg:#0b0b0f; --panel:#15151c; --panel-2:#1b1b23; --line:#26262f; --ink:#e9e9f0; --mut:#9a9ab0; --acc:#66aadd; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.6 -apple-system,"Segoe UI","PingFang SC",sans-serif;-webkit-font-smoothing:antialiased}
  header{padding:48px 32px 28px;border-bottom:1px solid var(--line);max-width:1400px;margin:0 auto}
  h1{margin:0 0 8px;font-size:28px;letter-spacing:-0.02em;font-weight:650}
  header p{margin:0;color:var(--mut);max-width:70ch}
  .wrap{max-width:1400px;margin:0 auto}
  h2{margin:44px 32px 4px;font-size:15px;font-weight:600;letter-spacing:0.04em;color:var(--ink);text-transform:uppercase}
  .sub{margin:0 32px 18px;color:var(--mut);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;padding:0 32px 8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .2s,transform .2s}
  .card:hover{border-color:#3a3a47;transform:translateY(-2px)}
  .card .ttl{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.05)}
  .card .ttl b{font-size:14px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .ttl a{color:var(--acc);text-decoration:none;font-size:12px;border:1px solid var(--line);padding:4px 9px;border-radius:8px;flex:none;transition:border-color .2s,color .2s}
  .card .ttl a:hover{border-color:var(--acc);color:#fff}
  .pair{display:grid;grid-template-columns:1fr 1fr}
  .pair figure{margin:0;border-right:1px solid var(--line)}
  .pair figure:last-child{border-right:0}
  .pair figcaption{font-size:11px;color:var(--mut);padding:7px 10px;border-top:1px solid var(--line);text-align:center;letter-spacing:.03em}
  .shot{display:block;width:100%;height:264px;object-fit:cover;object-position:top center;background:#000}
  a.zoom{display:block;line-height:0}
  footer{color:var(--mut);font-size:12px;padding:36px 32px;border-top:1px solid var(--line);margin-top:36px;max-width:1400px;margin-left:auto;margin-right:auto}
  footer code{color:#c9c9d6;background:var(--panel-2);padding:1px 6px;border-radius:5px;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px}
</style>
</head>
<body>
<header>
  <h1>设计系统库 · 截图总览</h1>
  <p>基于 Geist / Vercel 衍生 — 8 套通用风格 + 9 个项目定制，每套含亮 / 暗两态。点缩略图看大图，点「打开」查看可交互 preview（含真实字体、完整组件、移动端与主题切换）。</p>
</header>

<div class="wrap">
  <h2>通用风格库 · 8 套</h2>
  <p class="sub">可复用 — 共享 <code>--ds-*</code> Token 契约，换一份 tokens.css 即可整体换肤</p>
  <div class="grid" id="styles"></div>

  <h2>项目定制 · 9 个</h2>
  <p class="sub">读取各项目真实上下文后专属定制</p>
  <div class="grid" id="projects"></div>
</div>

<footer><code>~/mineproj/designsystem</code> · screenshots/ 共 34 张 · 双击任意 preview.html 离线可用</footer>

<script>
const styles = [
  ["style-01-cute","01-cute","可爱风","#ff6b9d"],
  ["style-02-pixel","02-pixel","像素风","#3ab44a"],
  ["style-03-enterprise","03-enterprise","企业风","#2563eb"],
  ["style-04-b-side","04-b-side","B 端风","#165dff"],
  ["style-05-gov-cn","05-gov-cn","中国政府风","#c4161c"],
  ["style-06-dark-tech","06-dark-tech","暗黑科技风","#00e0c6"],
  ["style-07-editorial","07-editorial","极简 editorial 风","#b4541e"],
  ["style-08-neumorphism","08-neumorphism","新拟物风","#4a6fc4"],
];
const projects = [
  ["proj-subei-travel","subei-travel","subei-travel · 像素旅行 HUD","#0d7a72"],
  ["proj-hahatool","hahatool","hahatool · 企业 + 4 主题","#7c3aed"],
  ["proj-hahafree-research","hahafree-research","hahafree · 玫瑰情报台","#9e4799"],
  ["proj-hahamail","hahamail","hahamail · 邮件靛蓝","#3d4eea"],
  ["proj-hahaagent","hahaagent","hahaagent · Agent 控制台","#22d3ee"],
  ["proj-aibacknovel","aibacknovel","aibacknovel · 三主题阅读","#b4541e"],
  ["proj-xiunobbs","xiunobbs","xiunobbs · 论坛社区","#1a73d1"],
  ["proj-haha-soft-research","haha-soft-research","haha-soft · 开源全家桶","#0f7d5e"],
  ["proj-hahaclean","hahaclean","hahaclean · 新拟物清理","#11806c"],
];
function render(list, dir, mount){
  document.getElementById(mount).innerHTML = list.map(([f,slug,name,color])=>`
    <div class="card">
      <div class="ttl"><span class="dot" style="background:${color}"></span><b>${name}</b><a href="${dir}/${slug}/preview.html" target="_blank">打开 preview</a></div>
      <div class="pair">
        <figure><a class="zoom" href="screenshots/${f}.png" target="_blank"><img class="shot" src="screenshots/${f}.png" loading="lazy" alt="${name} 亮色"></a><figcaption>亮色 Light</figcaption></figure>
        <figure><a class="zoom" href="screenshots/${f}--dark.png" target="_blank"><img class="shot" src="screenshots/${f}--dark.png" loading="lazy" alt="${name} 暗色"></a><figcaption>暗色 Dark</figcaption></figure>
      </div>
    </div>`).join("");
}
render(styles,"styles","styles");
render(projects,"projects","projects");
</script>
</body>
</html>
