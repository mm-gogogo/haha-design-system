<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声纹 · 录音组件（效果临摹）</title>
<link rel="stylesheet" href="../../_fonts/fonts.css">
<style>
  :root{
    --bg-a:#f1efe9;
    --bg-b:#e4e1d8;
    --card:#16171b;
    --card-2:#1d1f25;
    --ink:#f5f5f7;
    --muted:#8b8f99;
    --faint:#5b5e68;
    --accent:#ff5b53;
    --accent-soft:rgba(255,91,83,.16);
    --wave:#e8e8ec;
    --line:rgba(255,255,255,.08);
    --sans:'Inter',-apple-system,'PingFang SC',BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono','Roboto Mono',ui-monospace,monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{height:100%;}

  body{
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(120% 120% at 18% 8%, #f7f6f1 0%, var(--bg-a) 42%, var(--bg-b) 100%);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---- card ---- */
  .widget{
    position:relative;
    width:min(380px,100%);
    background:linear-gradient(180deg,var(--card-2),var(--card));
    border:1px solid rgba(255,255,255,.06);
    border-radius:26px;
    padding:26px 26px 24px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 30px 60px -24px rgba(20,20,28,.55),
      0 8px 24px -12px rgba(20,20,28,.4);
    overflow:hidden;
  }
  /* faint top sheen */
  .widget::before{
    content:"";
    position:absolute;
    inset:0 0 auto 0;
    height:140px;
    background:radial-gradient(80% 120% at 50% -40%, rgba(255,255,255,.07), transparent 70%);
    pointer-events:none;
  }

  .head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:30px;height:30px;border-radius:9px;
    display:grid;place-items:center;
    background:linear-gradient(150deg,#26282f,#15161a);
    border:1px solid rgba(255,255,255,.08);
    color:var(--ink);
  }
  .brand-name{
    font-size:13.5px;font-weight:600;letter-spacing:.2px;
  }
  .brand-sub{
    display:block;
    font-family:var(--mono);
    font-size:9.5px;letter-spacing:1.4px;
    color:var(--faint);text-transform:uppercase;
    margin-top:2px;
  }
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    font-family:var(--mono);
    font-size:10px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    padding:6px 10px;border-radius:999px;
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 var(--accent-soft);
    animation:beacon 1.8s ease-out infinite;
  }
  @keyframes beacon{
    0%{box-shadow:0 0 0 0 rgba(255,91,83,.5);}
    70%{box-shadow:0 0 0 8px rgba(255,91,83,0);}
    100%{box-shadow:0 0 0 0 rgba(255,91,83,0);}
  }

  /* ---- waveform stage ---- */
  .stage{
    position:relative;
    height:128px;
    border-radius:18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
      var(--card);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:18px;
  }
  /* center baseline */
  .stage::after{
    content:"";
    position:absolute;left:18px;right:18px;top:50%;
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);
  }

  .wave{
    display:flex;
    align-items:center;
    gap:4px;
    height:78px;
    padding:0 8px;
    z-index:1;
  }
  .bar{
    width:4px;
    border-radius:3px;
    background:linear-gradient(180deg,var(--wave),#aeb0ba);
    height:18%;
    transform-origin:center;
    animation:bounce 1.1s ease-in-out infinite;
    opacity:.92;
  }
  @keyframes bounce{
    0%,100%{transform:scaleY(.24);}
    50%{transform:scaleY(1);}
  }

  /* paused (stopped) state — frozen flat-ish wave */
  .widget.paused .wave .bar{
    animation-play-state:paused;
    transform:scaleY(.22);
    background:linear-gradient(180deg,#6c6f78,#4c4e55);
    opacity:.7;
  }
  .widget.paused .chip{opacity:.55;}
  .widget.paused .dot{animation:none;background:var(--muted);box-shadow:none;}

  /* ---- readout ---- */
  .readout{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
    padding:0 2px;
  }
  .status{
    font-size:13px;
    line-height:1.45;
    color:var(--ink);
    max-width:62%;
  }
  .status .muted{color:var(--muted);display:block;font-size:11.5px;margin-top:3px;}
  .timer{
    font-family:var(--mono);
    font-size:26px;
    font-weight:500;
    letter-spacing:1px;
    color:var(--ink);
    line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .timer .ms{font-size:14px;color:var(--muted);}
  .meta{
    display:flex;justify-content:flex-end;
    font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;
    color:var(--faint);margin-top:6px;text-transform:uppercase;
  }

  /* ---- controls ---- */
  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
  }
  .ctl{
    width:44px;height:44px;border-radius:50%;
    display:grid;place-items:center;
    background:rgba(255,255,255,.035);
    border:1px solid var(--line);
    color:var(--muted);
    cursor:pointer;
    transition:background .2s ease,color .2s ease,transform .15s ease,border-color .2s ease;
  }
  .ctl:hover{color:var(--ink);background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.16);}
  .ctl:active{transform:scale(.94);}

  .record{
    position:relative;
    width:72px;height:72px;border-radius:50%;
    border:none;cursor:pointer;
    background:radial-gradient(120% 120% at 30% 25%, #ff7068, var(--accent) 60%, #e0463f);
    box-shadow:
      0 0 0 6px rgba(255,91,83,.12),
      0 12px 26px -10px rgba(255,91,83,.6);
    display:grid;place-items:center;
    color:#fff;
    transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .25s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .record:hover{transform:scale(1.04);}
  .record:active{transform:scale(.97);}
  .record .ic-stop{display:none;}
  /* breathing halo while recording */
  .record::before{
    content:"";
    position:absolute;inset:0;border-radius:50%;
    box-shadow:0 0 0 0 rgba(255,91,83,.35);
    animation:halo 2s ease-out infinite;
  }
  @keyframes halo{
    0%{box-shadow:0 0 0 0 rgba(255,91,83,.45);}
    75%{box-shadow:0 0 0 18px rgba(255,91,83,0);}
    100%{box-shadow:0 0 0 0 rgba(255,91,83,0);}
  }
  /* stopped: show stop->record swap, dim halo */
  .widget.paused .record{
    background:radial-gradient(120% 120% at 30% 25%, #3a3c44, #25272d 60%, #1b1d22);
    box-shadow:0 0 0 6px rgba(255,255,255,.05), 0 10px 22px -12px rgba(0,0,0,.6);
  }
  .widget.paused .record::before{animation:none;box-shadow:none;}
  .widget.paused .record .ic-stop{display:block;}
  .widget.paused .record .ic-mic{display:none;}

  .ctl-label{
    text-align:center;
    font-family:var(--mono);
    font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--faint);
    margin-top:14px;
  }

  /* focus ring for keyboard */
  .record:focus-visible,.ctl:focus-visible{
    outline:2px solid #ffd166;outline-offset:3px;
  }

  /* ---- reduced motion: freeze everything ---- */
  @media (prefers-reduced-motion: reduce){
    .bar{animation:none !important;transform:scaleY(.5);}
    .dot{animation:none !important;}
    .record::before{animation:none !important;}
    .widget.paused .bar{transform:scaleY(.22);}
  }

  /* ---- mobile overflow guard ---- */
  @media (max-width:680px){ html{overflow-x:hidden!important;} body{overflow-x:clip!important;} }
</style>
</head>
<body>

  <main class="widget" id="widget" aria-label="录音组件">

    <div class="head">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12h2l2-6 3 14 3-18 2.5 12 2-4H21"/>
          </svg>
        </span>
        <span>
          <span class="brand-name">声纹 Echolab</span>
          <span class="brand-sub">Session · 录音中</span>
        </span>
      </div>
      <span class="chip"><span class="dot" aria-hidden="true"></span>Live</span>
    </div>

    <div class="stage" role="img" aria-label="实时音频波形">
      <div class="wave" id="wave" aria-hidden="true"></div>
    </div>

    <div class="readout">
      <div class="status" id="status">
        正在录音…
        <span class="muted">设备已连接，正在采集声音。</span>
      </div>
      <div>
        <div class="timer"><span id="time">00:12</span><span class="ms" id="ms">.04</span></div>
        <div class="meta">48 kHz · 单声道</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctl" type="button" aria-label="重新开始" id="resetBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/>
        </svg>
      </button>

      <button class="record" type="button" id="recordBtn" aria-label="点击停止录音">
        <svg class="ic-mic" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v4"/><path d="M8 22h8"/>
        </svg>
        <svg class="ic-stop" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="6" y="6" width="12" height="12" rx="3"/>
        </svg>
      </button>

      <button class="ctl" type="button" aria-label="保存录音" id="saveBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <path d="M17 21v-8H7v8M7 3v5h8"/>
        </svg>
      </button>
    </div>

    <div class="ctl-label" id="ctlLabel">点击停止</div>

  </main>

  <script>
    (function(){
      var widget   = document.getElementById('widget');
      var waveEl   = document.getElementById('wave');
      var recordBtn= document.getElementById('recordBtn');
      var resetBtn = document.getElementById('resetBtn');
      var timeEl   = document.getElementById('time');
      var msEl     = document.getElementById('ms');
      var statusEl = document.getElementById('status');
      var ctlLabel = document.getElementById('ctlLabel');

      // build waveform bars with staggered animation-delay + varied durations
      var BARS = 40;
      var frag = document.createDocumentFragment();
      for(var i=0;i<BARS;i++){
        var b = document.createElement('span');
        b.className = 'bar';
        // pseudo-random but deterministic feel
        var dur = 0.85 + ((i*37)%55)/100;          // 0.85s – 1.40s
        var delay = -((i*53)%120)/100;             // negative -> desync start
        b.style.animationDuration = dur.toFixed(2)+'s';
        b.style.animationDelay = delay.toFixed(2)+'s';
        frag.appendChild(b);
      }
      waveEl.appendChild(frag);

      // timer
      var recording = true;
      var startBase = 12.04;            // seed at 00:12.04 so it looks mid-session
      var t0 = Date.now() - startBase*1000;

      function fmt(){
        var elapsed = (Date.now() - t0)/1000;
        var total = Math.floor(elapsed);
        var mm = Math.floor(total/60);
        var ss = total%60;
        var ms = Math.floor((elapsed - total)*100);
        var pad = function(n){return (n<10?'0':'')+n;};
        timeEl.textContent = pad(mm)+':'+pad(ss);
        msEl.textContent = '.'+pad(ms);
      }
      var tick = setInterval(fmt, 60);
      fmt();

      function setRecording(on){
        recording = on;
        if(on){
          widget.classList.remove('paused');
          statusEl.innerHTML = '正在录音…<span class="muted">设备已连接，正在采集声音。</span>';
          recordBtn.setAttribute('aria-label','点击停止录音');
          ctlLabel.textContent = '点击停止';
          t0 = Date.now() - startBase*1000;
          fmt();
          tick = setInterval(fmt, 60);
        }else{
          widget.classList.add('paused');
          statusEl.innerHTML = '录音已停止<span class="muted">音频已加密保存到本地。</span>';
          recordBtn.setAttribute('aria-label','点击继续录音');
          ctlLabel.textContent = '点击继续';
          clearInterval(tick);
        }
      }

      recordBtn.addEventListener('click', function(){
        setRecording(!recording);
      });

      resetBtn.addEventListener('click', function(){
        startBase = 0;
        if(recording){
          clearInterval(tick);
          t0 = Date.now();
          fmt();
          tick = setInterval(fmt, 60);
        }else{
          setRecording(true);
        }
      });
    })();
  </script>
