<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Music Player · 效果临摹</title>
<link rel="stylesheet" href="../../_fonts/fonts.css">
<style>
  :root{
    --glass-bg: rgba(255,255,255,.07);
    --glass-bg-strong: rgba(255,255,255,.12);
    --glass-line: rgba(255,255,255,.16);
    --glass-line-soft: rgba(255,255,255,.10);
    --hi: rgba(255,255,255,.55);          /* 1px 顶部高光 */
    --txt: #ffffff;
    --txt-2: rgba(255,255,255,.62);
    --txt-3: rgba(255,255,255,.42);
    --accent: #b9c6ff;
    --r-xl: 30px;
    --r-lg: 22px;
    --r-md: 16px;
    --r-pill: 999px;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }

  html, body{ height:100%; }

  body{
    font-family:"Inter", system-ui, -apple-system, "PingFang SC", sans-serif;
    color:var(--txt);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    position:relative;
    overflow:hidden;
    /* 柔和模糊的彩色渐变背景 */
    background:
      radial-gradient(closest-side at 18% 22%, rgba(120,86,255,.55), transparent 70%),
      radial-gradient(closest-side at 82% 18%, rgba(255,94,164,.50), transparent 72%),
      radial-gradient(closest-side at 70% 86%, rgba(58,196,255,.48), transparent 70%),
      radial-gradient(closest-side at 28% 90%, rgba(255,176,84,.38), transparent 72%),
      linear-gradient(160deg, #18141f 0%, #0c0a12 100%);
  }

  /* 背景颗粒/暗角，增加质感 */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(120% 120% at 50% 0%, transparent 55%, rgba(0,0,0,.45) 100%);
    z-index:0;
  }

  /* ============ 播放器外壳 ============ */
  .player{
    position:relative;
    z-index:1;
    width:min(420px, 100%);
    padding:26px 26px 22px;
    border-radius:var(--r-xl);
    background:var(--glass-bg);
    border:1px solid var(--glass-line);
    -webkit-backdrop-filter: blur(34px) saturate(140%);
    backdrop-filter: blur(34px) saturate(140%);
    box-shadow:
      0 40px 90px -28px rgba(0,0,0,.72),
      0 2px 0 rgba(0,0,0,.18),
      inset 0 1px 0 var(--hi);            /* 1px 顶部高光 */
  }

  /* 顶部细标题行 */
  .player__top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .top__label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--txt-2);
  }
  .top__label .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 10px 1px rgba(185,198,255,.8);
  }
  .top__chip{
    font:600 11px/1 var(--mono);
    color:var(--txt-2);
    background:var(--glass-bg-strong);
    border:1px solid var(--glass-line-soft);
    padding:6px 11px;
    border-radius:var(--r-pill);
  }

  /* ============ 专辑封面 ============ */
  .art{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;
    border-radius:var(--r-lg);
    overflow:hidden;
    box-shadow:
      0 26px 48px -18px rgba(0,0,0,.65),
      inset 0 1px 0 rgba(255,255,255,.22);
  }
  .art img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transform:scale(1.02);
  }
  /* 封面上的玻璃反光 */
  .art::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(255,255,255,.18), transparent 38%);
    pointer-events:none;
  }
  /* 封面左下角播放计数小标签（玻璃） */
  .art__badge{
    position:absolute;
    left:12px; bottom:12px;
    display:flex; align-items:center; gap:6px;
    font:600 11px/1 var(--mono);
    color:#fff;
    background:rgba(18,16,26,.5);
    -webkit-backdrop-filter:blur(10px);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.18);
    padding:6px 10px;
    border-radius:var(--r-pill);
  }
  .art__badge svg{ width:12px; height:12px; }

  /* ============ 曲目信息 + 迷你均衡器 ============ */
  .meta{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    margin:22px 2px 18px;
  }
  .meta__text{ min-width:0; }
  .meta__title{
    font-size:22px;
    font-weight:700;
    letter-spacing:-.01em;
    line-height:1.18;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .meta__artist{
    margin-top:5px;
    font-size:13.5px;
    color:var(--txt-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* 迷你均衡器 */
  .eq{
    display:flex;
    align-items:flex-end;
    gap:3px;
    height:22px;
    flex:0 0 auto;
    padding-bottom:2px;
  }
  .eq span{
    width:3px;
    border-radius:2px;
    background:linear-gradient(180deg, var(--accent), rgba(185,198,255,.4));
    box-shadow:0 0 8px rgba(185,198,255,.45);
    animation:eq 1.1s ease-in-out infinite;
  }
  .eq span:nth-child(1){ height:8px;  animation-delay:-.20s; }
  .eq span:nth-child(2){ height:18px; animation-delay:-.55s; }
  .eq span:nth-child(3){ height:12px; animation-delay:-.95s; }
  .eq span:nth-child(4){ height:20px; animation-delay:-.35s; }
  .eq span:nth-child(5){ height:9px;  animation-delay:-.75s; }
  @keyframes eq{
    0%,100%{ transform:scaleY(.35); }
    50%    { transform:scaleY(1);   }
  }

  /* ============ 进度条 ============ */
  .progress{
    margin:0 2px;
  }
  .progress__track{
    position:relative;
    height:5px;
    border-radius:var(--r-pill);
    background:rgba(255,255,255,.12);
    cursor:pointer;
  }
  .progress__fill{
    position:absolute;
    inset:0 auto 0 0;
    width:43%;
    border-radius:var(--r-pill);
    background:linear-gradient(90deg, #e7ebff, #ffffff);
    box-shadow:0 0 14px rgba(255,255,255,.55);
  }
  .progress__knob{
    position:absolute;
    top:50%;
    left:43%;
    width:13px; height:13px;
    border-radius:50%;
    background:#fff;
    transform:translate(-50%, -50%);
    box-shadow:0 2px 8px rgba(0,0,0,.45), 0 0 0 4px rgba(255,255,255,.12);
  }
  .progress__times{
    display:flex;
    justify-content:space-between;
    margin-top:9px;
    font:600 11px/1 var(--mono);
    color:var(--txt-2);
  }

  /* ============ 主控按钮 ============ */
  .transport{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin:20px 0 18px;
  }
  .ctrl{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    background:transparent;
    border:none;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .ctrl svg{ display:block; }

  /* 上一首 / 下一首 玻璃圆钮 */
  .ctrl--side{
    width:48px; height:48px;
    border-radius:50%;
    background:var(--glass-bg-strong);
    border:1px solid var(--glass-line);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 8px 18px -10px rgba(0,0,0,.6);
    transition:transform .18s ease, background .18s ease;
  }
  .ctrl--side svg{ width:18px; height:18px; }
  .ctrl--side:hover{ background:rgba(255,255,255,.20); transform:scale(1.06); }
  .ctrl--side:active{ transform:scale(.96); }

  /* 边角小钮（随机/循环） */
  .ctrl--ghost{
    width:40px; height:40px;
    border-radius:50%;
    color:var(--txt-2);
    transition:color .18s ease, background .18s ease;
  }
  .ctrl--ghost svg{ width:18px; height:18px; }
  .ctrl--ghost:hover{ color:#fff; background:rgba(255,255,255,.08); }
  .ctrl--ghost.is-on{ color:var(--accent); }

  /* 播放/暂停大钮 */
  .ctrl--play{
    width:66px; height:66px;
    border-radius:50%;
    color:#16121f;
    background:radial-gradient(120% 120% at 30% 25%, #ffffff, #dfe2f2);
    box-shadow:
      0 14px 28px -8px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(255,255,255,.9),
      0 0 0 1px rgba(255,255,255,.25);
    transition:transform .18s ease;
  }
  .ctrl--play svg{ width:26px; height:26px; margin-left:2px; }
  .ctrl--play:hover{ transform:scale(1.05); }
  .ctrl--play:active{ transform:scale(.97); }

  /* ============ 底部音量条 ============ */
  .footer{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:6px;
    padding:14px 16px;
    border-radius:var(--r-md);
    background:var(--glass-bg);
    border:1px solid var(--glass-line-soft);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14);
  }
  .footer__icon{ color:var(--txt-2); flex:0 0 auto; }
  .footer__icon svg{ width:18px; height:18px; display:block; }
  .volume{
    position:relative;
    flex:1 1 auto;
    height:5px;
    border-radius:var(--r-pill);
    background:rgba(255,255,255,.12);
    cursor:pointer;
  }
  .volume__fill{
    position:absolute;
    inset:0 auto 0 0;
    width:68%;
    border-radius:var(--r-pill);
    background:linear-gradient(90deg, rgba(185,198,255,.85), #ffffff);
    box-shadow:0 0 10px rgba(185,198,255,.4);
  }
  .volume__knob{
    position:absolute;
    top:50%; left:68%;
    width:11px; height:11px;
    border-radius:50%;
    background:#fff;
    transform:translate(-50%,-50%);
    box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  .footer__pct{
    font:600 11px/1 var(--mono);
    color:var(--txt-2);
    flex:0 0 auto;
    width:34px;
    text-align:right;
  }

  /* ============ 无障碍：减少动效 ============ */
  @media (prefers-reduced-motion: reduce){
    .eq span{ animation:none; transform:scaleY(.7); }
    .ctrl, .ctrl--play, .ctrl--side{ transition:none; }
  }

  /* ============ 移动端 ============ */
  @media (max-width:440px){
    .player{ padding:20px 18px 18px; border-radius:26px; }
    .meta__title{ font-size:20px; }
    .ctrl--play{ width:60px; height:60px; }
    .transport{ gap:12px; }
  }

  @media (max-width:680px){
    html{ overflow-x:hidden!important; }
    body{ overflow-x:clip!important; }
  }
</style>
</head>
<body>

  <main class="player" aria-label="玻璃拟态音乐播放器">

      <div class="top__chip">FLAC · 24-bit</div>
    </div>

    <div class="art">
      <img src="../../_assets/gen/abstract-wave.jpg" alt="专辑封面：抽象声波">

        <div class="meta__title">Velvet Static</div>
        <div class="meta__artist">Marlo Vance &amp; The Paper Moons</div>

      <div class="eq" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="progress">
      <div class="progress__track" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="43" tabindex="0">
        <div class="progress__fill"></div>
        <div class="progress__knob"></div>
      </div>
      <div class="progress__times">
        <span>1:48</span>
        <span>-2:23</span>
      </div>
    </div>

    <div class="transport">
      <button class="ctrl ctrl--ghost is-on" type="button" aria-label="随机播放" aria-pressed="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>
        </svg>
      </button>

      <button class="ctrl ctrl--side" type="button" aria-label="上一首">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M11 19 2 12l9-7v14z"/><path d="M22 19V5h-2v14h2z"/>
        </svg>
      </button>

      <button class="ctrl ctrl--play" type="button" aria-label="播放">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <button class="ctrl ctrl--side" type="button" aria-label="下一首">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M13 19l9-7-9-7v14z"/><path d="M2 19V5h2v14H2z"/>
        </svg>
      </button>

      <button class="ctrl ctrl--ghost" type="button" aria-label="循环播放" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <div class="footer">
      <span class="footer__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/>
        </svg>
      </span>
      <div class="volume" role="slider" aria-label="音量" aria-valuemin="0" aria-valuemax="100" aria-valuenow="68" tabindex="0">
        <div class="volume__fill"></div>
        <div class="volume__knob"></div>
      </div>
      <span class="footer__pct">68%</span>
    </div>

  </main>
